<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8 Наурыз - Шақыру</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            margin: 0; padding: 0;
            min-height: 100dvh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(-45deg, #2c1635, #4B1D52, #8b2853, #d96272);
            background-size: 200% 200%;
            animation: gradientBG 10s ease infinite;
            font-family: 'Montserrat', sans-serif;
            color: white; overflow: hidden; text-align: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .content-wrapper {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; width: 90%; max-width: 450px;
            transition: all 0.5s ease;
        }

        body.modal-open .content-wrapper { filter: blur(8px); opacity: 0.2; pointer-events: none; }

        .gif-container img {
            width: 180px; height: 180px; object-fit: cover; border-radius: 50%;
            box-shadow: 0 0 25px rgba(255, 123, 137, 0.5);
            margin-bottom: 25px; border: 3px solid rgba(255, 255, 255, 0.3);
        }

        h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; text-shadow: 0 0 15px rgba(255, 123, 137, 0.9); }
        p { font-size: 1rem; line-height: 1.6; margin-bottom: 35px; font-weight: 600; }

        .buttons { display: flex; justify-content: center; gap: 15px; width: 100%; min-height: 60px; }
        button {
            padding: 14px 28px; font-size: 1rem; border: none; border-radius: 30px;
            cursor: pointer; font-weight: 800; text-transform: uppercase; transition: all 0.3s ease;
        }

        .btn-yes { background: linear-gradient(90deg, #00C9FF 0%, #92FE9D 100%); color: #000; }
        .btn-no { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(5px); color: white; border: 1.5px solid rgba(255,255,255,0.5); }

        #formContainer { display: none; flex-direction: column; align-items: center; gap: 15px; width: 100%; margin-top: 20px; }
        input[type="text"] {
            width: 100%; box-sizing: border-box; padding: 16px 20px; font-size: 1rem;
            border-radius: 20px; border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
            color: white; text-align: center;
        }

        .radio-group { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .radio-label {
            display: flex; align-items: center; gap: 12px; padding: 14px 18px;
            border: 2px solid rgba(255,255,255,0.3); border-radius: 20px;
            background: rgba(255,255,255,0.2); font-weight: 600; cursor: pointer;
        }
        .radio-label:has(input:checked) { border-color: #92FE9D; background: rgba(146, 254, 157, 0.2); color: #92FE9D; }

        .btn-submit { background: linear-gradient(90deg, #FF512F 0%, #DD2476 100%); color: white; width: 100%; margin-top: 10px;}

        .custom-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .custom-modal-overlay.active { display: flex; }
        .custom-modal-box {
            background: rgba(40, 20, 60, 0.95); padding: 40px 30px; border-radius: 30px;
            text-align: center; width: 320px; border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .modal-title { color: #92FE9D; font-size: 1.8rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <div class="gif-container">
            <img id="girlAvatar" src="https://media.tenor.com/tU2oEw0kC_0AAAAi/bear-flowers.gif" alt="Avatar">
        </div>
        <h1 id="title">Құрметті арулар!</h1>
        <p id="question">
            Көктемнің ең әдемі мерекесі — 8 Наурыз қасиетті Рамазан айымен тұспа-тұс келіп отыр. <br><br>
            Осы орайда ұйымдастырылатын <b>28 ақпандағы мерекелік Ауызашардың</b> қадірлі қонағы болыңыздар! Келесіздер ме?
        </p>

        <div class="buttons">
            <button class="btn-yes" id="yesBtn" onclick="acceptInvite()">Әрине! 💖</button>
            <button class="btn-no" id="noBtn" onclick="handleNoClick()">Жоқ 🙈</button>
        </div>

        <div id="formContainer">
            <input type="text" id="guestName" placeholder="Атыңызды растаңыз..." required>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="attendance" value="Келемін" checked> Келемін 🌸</label>
                <label class="radio-label"><input type="radio" name="attendance" value="Келе алмаймын"> Келе алмаймын 😔</label>
            </div>
            <button class="btn-submit" id="submitBtn" onclick="sendData()">Жауапты жіберу 🚀</button>
        </div>
    </div>

    <div class="custom-modal-overlay" id="successModal">
        <div class="custom-modal-box">
            <span style="font-size: 4rem;">🎉</span>
            <h2 class="modal-title">Рақмет!</h2>
            <p>Жауабыңыз сәтті жіберілді. <br>Кездескенше! ✨</p>
        </div>
    </div>

    <script>
        // 1. ТІЗІМДЕГІ ҮТІРЛЕРДІ ТҮЗЕТТІК
        const girlsCollection = {
            "c3d4kayaulym": { name: "Аяулым", photo: "photo_2025-12-14_20-57-24.jpg" },
            "c5d6zayaulym": { name: "Аяулым", photo: "zayaulym.jpg" },
            "c7d8aigerim": { name: "Әйгерім", photo: "aigerim.jpg" },
            "c9d10nazerke": { name: "Назерке", photo: "nazerke.jpg" },
            "c11d12kamila": { name: "Камила", photo: "kamila.jpg" },
            "c13d14aruzhan": { name: "Аружан", photo: "aruzhan.jpg" },
            "c15d16mira": { name: "Мира", photo: "mira.jpg" },
            "c17d18elvina": { name: "Эльвина", photo: "elvina.jpg" },
            "c19d20tomiris": { name: "Томирис", photo: "tomiris.jpg" },
            "c21d22kunsulu": { name: "Күнсұлу", photo: "kunsulu.jpg" }
        };

        const avatarImg = document.getElementById('girlAvatar');
        const titleH1 = document.getElementById('title');
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');

        const params = new URLSearchParams(window.location.search);
        const girlId = params.get('id');

        // Егер ID табылса, мәліметті ауыстырамыз
        if (girlId && girlsCollection[girlId]) {
            const g = girlsCollection[girlId];
            avatarImg.src = g.photo;
            titleH1.innerText = `Құрметті ${g.name}! 🌸`;
            document.getElementById('guestName').value = g.name;
        }

        let noClickCount = 0;
        let scaleFactor = 1;
        let isSwimming = false;

        function handleNoClick() {
            if (isSwimming) return;
            noClickCount++;
            if (noClickCount <= 3) noBtn.innerText = ["Сенімдісіз бе?", "Ауызашар ғой!", "Ұстап көріңіз!"][noClickCount-1];

            scaleFactor += 0.4;
            yesBtn.style.transform = `scale(${scaleFactor})`;

            if (noClickCount >= 3) {
                isSwimming = true;
                const rect = noBtn.getBoundingClientRect();
                document.body.appendChild(noBtn);
                noBtn.style.position = 'fixed';
                noBtn.style.left = rect.left + 'px'; noBtn.style.top = rect.top + 'px';
                noBtn.style.transition = 'all 0.4s ease-out';
                setTimeout(swimAway, 100);
            }
        }

        function swimAway() {
            if (!isSwimming) return;
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 120;
            noBtn.style.left = Math.max(10, Math.floor(Math.random() * maxX)) + 'px';
            noBtn.style.top = Math.max(10, Math.floor(Math.random() * maxY)) + 'px';
        }

        noBtn.addEventListener('mouseover', swimAway);
        noBtn.addEventListener('touchstart', (e) => { if(isSwimming) { e.preventDefault(); swimAway(); }});

        function acceptInvite() {
            // "Иә" басқанда арудың суреті қуанышты гифке ауысады
            document.getElementById('girlAvatar').src = "https://media.tenor.com/97mG3d-U2r8AAAAi/tkthao219-bubududu.gif";
            document.getElementById('question').innerHTML = "<b>28 ақпан</b> күні күтеміз! <br>Жауабыңызды растаңыз: ✨";
            document.querySelector('.buttons').style.display = 'none';
            if(noBtn) noBtn.style.display = 'none';
            document.getElementById('formContainer').style.display = 'flex';
            fireConfetti();
        }

        function sendData() {
            const name = document.getElementById('guestName').value.trim();
            const attendance = document.querySelector('input[name="attendance"]:checked').value;
            const submitBtn = document.getElementById('submitBtn');
            const myEmail = "amirzhanmeirzhan5@gmail.com";

            if (!name) return alert("Атыңызды жазыңыз!");
            submitBtn.innerText = "Жіберілуде..."; submitBtn.disabled = true;

            fetch(`https://formsubmit.co/ajax/${myEmail}`, {
                method: "POST", headers: {'Content-Type': 'application/json', 'Accept': 'application/json'},
                body: JSON.stringify({"Қонақ": name, "Шешімі": attendance})
            })
            .then(() => {
                document.getElementById('successModal').classList.add('active');
                document.body.classList.add('modal-open');
            })
            .catch(() => { alert("Қате! Интернетті тексеріңіз."); submitBtn.disabled = false; });
        }

        function fireConfetti() {
            const end = Date.now() + 2000;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
